<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home | Phone Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <div class="logo">PhoneShop</div>

    <nav>
        <a th:href="@{/home}">Home</a>
        <a href="#">Products</a>

        <!-- Brand Dropdown -->
        <div class="dropdown">
            <button class="dropbtn">Brands</button>
            <div class="dropdown-content">
                <a th:each="b : ${brands}"
                   th:text="${b}"
                   th:href="@{'/cate/' + ${b.toLowerCase()}}">
                </a>
            </div>
        </div>

        <a href="/login">Login</a>
    </nav>
</header>

<!-- ================= MAIN ================= -->
<main class="container">
    <h1>Welcome to PhoneShop</h1>
    <p>This is a public home page (whitelist)</p>

    <section class="product-preview">
        <div class="card">iPhone</div>
        <div class="card">Samsung</div>
        <div class="card">Xiaomi</div>
    </section>
</main>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>© 2025 PhoneShop | All Rights Reserved</p>
</footer>

</body>
</html>
