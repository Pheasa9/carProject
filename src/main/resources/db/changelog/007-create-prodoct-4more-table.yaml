databaseChangeLog:
  - changeSet:
      id: 003-create-colors
      author: unpheasa.biu@gmail.com
      changes:
        - createTable:
            tableName: colors
            columns:
              - column:
                  name: color_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: color_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 004-create-products
      author: unpheasa.biu@gmail.com
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: image_path
                  type: VARCHAR(255)
              - column:
                  name: available_unit
                  type: INT
              - column:
                  name: sale_price
                  type: NUMERIC(15,2)
              - column:
                  name: model_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: color_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: model_id
            referencedTableName: models
            referencedColumnNames: id
            constraintName: fk_product_model
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: color_id
            referencedTableName: colors
            referencedColumnNames: color_id
            constraintName: fk_product_color

  - changeSet:
      id: 005-create-products-import-histories
      author: unpheasa.biu@gmail.com
      changes:
        - createTable:
            tableName: products_import_histories
            columns:
              - column:
                  name: import_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: import_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: import_unit
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: price_per_unit
                  type: NUMERIC(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: products_import_histories
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            constraintName: fk_import_product

  - changeSet:
      id: 006-create-sales
      author: unpheasa.biu@gmail.com
      changes:
        - createTable:
            tableName: sales
            columns:
              - column:
                  name: sale_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sold_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 007-create-sale-details
      author: unpheasa.biu@gmail.com
      changes:
        - createTable:
            tableName: sale_details
            columns:
              - column:
                  name: sale_detail_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sale_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: NUMERIC(15,2)
              - column:
                  name: unit
                  type: INT
        - addForeignKeyConstraint:
            baseTableName: sale_details
            baseColumnNames: sale_id
            referencedTableName: sales
            referencedColumnNames: sale_id
            constraintName: fk_sale_detail_sale
        - addForeignKeyConstraint:
            baseTableName: sale_details
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            constraintName: fk_sale_detail_product
