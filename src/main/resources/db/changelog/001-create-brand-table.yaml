databaseChangeLog:
  - changeSet:
      id: 001-create-brand-table.yaml
      author: unpheasa.biu@gmail.com
      changes:
        - createTable:
            tableName: brands
            columns:
              - column:
                  name: brand_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: brand_name
                  type: varchar(100)
                  constraints:
                    nullable: false
